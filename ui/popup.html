<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OnlySQ AI</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      width: 300px;
      height: auto;
      padding: 18px;
    }
    .popup-header {
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 10px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.connected {
      background-color: var(--color-success);
      box-shadow: 0 0 8px var(--color-success);
    }
    .status-dot.disconnected {
      background-color: var(--color-error);
      box-shadow: 0 0 8px var(--color-error);
    }
    .popup-btn {
      width: 100%;
      margin-bottom: 10px;
      justify-content: flex-start;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="uppercase-label" style="color: var(--color-accent); font-weight: bold; font-size: 12px;">OnlySQ AI</span>
    <div style="display: flex; align-items: center; font-size: 11px; font-family: 'Sora', sans-serif;">
      <span id="auth-status-dot" class="status-dot disconnected"></span>
      <span id="auth-status-text">Не авторизован</span>
    </div>
  </div>

  <button id="btn-open-sidepanel" class="primary popup-btn">
    <span class="material-symbols-outlined">side_navigation</span>Открыть боковую панель
  </button>

  <button id="btn-open-options" class="popup-btn">
    <span class="material-symbols-outlined">settings</span>Настройки
  </button>

  <div id="toast-container" style="position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 10000; display: flex; flex-direction: column; gap: 6px; pointer-events: none;"></div>

  <script src="../js/popup.js"></script>
</body>
</html>
